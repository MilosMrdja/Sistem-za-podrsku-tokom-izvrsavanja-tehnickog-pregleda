<label class="ui-field">
  <span class="ui-field__label">
    {{ label }}
    @if (required) {
      <span class="ui-field__required">*</span>
    }
  </span>
  <input
    class="ui-field__control"
    [class.ui-field__control--invalid]="showError"
    [type]="type"
    [placeholder]="placeholder"
    [value]="value ?? ''"
    [disabled]="disabled"
    [attr.maxlength]="maxLength"
    (input)="onInput($event)"
    (blur)="onBlur()"
  />
  @if (hint && !showError) {
    <span class="ui-field__hint">{{ hint }}</span>
  }
  @if (showError) {
    <span class="ui-field__error">{{ errorMessage }}</span>
  }
</label>
