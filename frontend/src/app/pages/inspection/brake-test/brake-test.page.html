<app-ui-form-card title="Test kočnica" [subtitle]="sessionSubtitle">
  @if (!started && !loading) {
    <app-ui-button type="button" label="Počni test kočnica" (click)="startTest()" />
  } @else if (loading) {
    <app-ui-loading [message]="statusMessage" />
  } @else {
    <p>Test je završen ili je došlo do greške. Proverite dijalog sa rezultatom.</p>
  }
</app-ui-form-card>
